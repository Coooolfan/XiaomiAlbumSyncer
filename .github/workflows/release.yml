name: release
run-name: Release ${{ inputs.version }}
on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号，例如 0.16.0 或 0.16.0-rc-1"
        required: true
        type: string
      latest:
        description: "发布为默认版本：推送 Docker latest、标记 GitHub Release Latest"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: 预检
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      target_sha: ${{ steps.prepare.outputs.target_sha }}
      prerelease: ${{ steps.prepare.outputs.prerelease }}
      publish_latest: ${{ steps.prepare.outputs.publish_latest }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 校验版本与目标引用
        id: prepare
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_LATEST: ${{ inputs.latest }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/release/prepare-release.sh

      - name: 输出发布摘要
        run: |
          {
            echo "## Xiaomi Album Syncer Release"
            echo
            echo "- Version: \`${{ steps.prepare.outputs.version }}\`"
            echo "- Workflow ref: \`${{ github.ref_name }}\`"
            echo "- Target SHA: \`${{ steps.prepare.outputs.target_sha }}\`"
            echo "- Prerelease: \`${{ steps.prepare.outputs.prerelease }}\`"
            echo "- Latest: \`${{ steps.prepare.outputs.publish_latest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-assets:
    name: 构建
    needs: prepare-release
    uses: ./.github/workflows/builder.yml
    with:
      version: ${{ needs.prepare-release.outputs.version }}
      prerelease: ${{ needs.prepare-release.outputs.prerelease }}
      publish_docker: 'true'
      publish_latest: ${{ needs.prepare-release.outputs.publish_latest }}
    secrets: inherit

  create-draft-release:
    name: 创建 tag 与草稿 Release
    needs:
      - prepare-release
      - build-assets
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 创建 tag 与草稿 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          TARGET_SHA: ${{ needs.prepare-release.outputs.target_sha }}
          PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
        run: ./.github/scripts/release/create-draft-release.sh

  upload-release-assets:
    name: 上传产物到 Release
    needs:
      - prepare-release
      - create-draft-release
    runs-on: ubuntu-latest

    steps:
      - name: 设置发布元信息
        run: |
          echo "VERSION=${{ needs.prepare-release.outputs.version }}" >> $GITHUB_ENV

      - name: 下载 Release 产物
        uses: actions/download-artifact@v4
        with:
          pattern: '{jar,native-*}'
          path: dist
          merge-multiple: true

      - name: 查看产物结构
        run: |
          ls -R dist

      - name: 安装 zip
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: 打包为 ZIP
        working-directory: dist
        run: |
          TAG=${VERSION}

          # Linux
          zip "xiaomi-album-syncer-linux-arm64-v${TAG}.zip" "xiaomi-album-syncer-linux-arm64-v${TAG}"
          zip "xiaomi-album-syncer-linux-x64-v${TAG}.zip"   "xiaomi-album-syncer-linux-x64-v${TAG}"

          # macOS
          zip "xiaomi-album-syncer-macos-arm64-v${TAG}.zip" "xiaomi-album-syncer-macos-arm64-v${TAG}"
          zip "xiaomi-album-syncer-macos-x64-v${TAG}.zip"   "xiaomi-album-syncer-macos-x64-v${TAG}"

          # Windows
          zip "xiaomi-album-syncer-windows-x64-v${TAG}.exe.zip" "xiaomi-album-syncer-windows-x64-v${TAG}.exe"

          # JAR
          zip "xiaomi-album-syncer-v${TAG}.jar.zip" "xiaomi-album-syncer-v${TAG}.jar"

      - name: 上传到 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          gh release upload "$VERSION" \
            "dist/xiaomi-album-syncer-linux-x64-v${VERSION}.zip" \
            "dist/xiaomi-album-syncer-linux-arm64-v${VERSION}.zip" \
            "dist/xiaomi-album-syncer-macos-x64-v${VERSION}.zip" \
            "dist/xiaomi-album-syncer-macos-arm64-v${VERSION}.zip" \
            "dist/xiaomi-album-syncer-windows-x64-v${VERSION}.exe.zip" \
            "dist/xiaomi-album-syncer-v${VERSION}.jar.zip" \
            --clobber

  publish-release:
    name: 公开 Release
    needs:
      - prepare-release
      - upload-release-assets
    runs-on: ubuntu-latest

    steps:
      - name: 公开 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
          PUBLISH_LATEST: ${{ needs.prepare-release.outputs.publish_latest }}
        run: |
          set -euo pipefail
          case "$PUBLISH_LATEST" in
            true | false) ;;
            *)
              echo "::error::PUBLISH_LATEST 必须是 true 或 false，当前为 $PUBLISH_LATEST"
              exit 1
              ;;
          esac
          RELEASE_ID="$(gh release view "$VERSION" --json databaseId --jq .databaseId)"
          PRERELEASE_FLAG=false
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG=true
          fi
          gh api --method PATCH "repos/{owner}/{repo}/releases/$RELEASE_ID" \
            -F draft=false \
            -F "prerelease=$PRERELEASE_FLAG" \
            -F "make_latest=$PUBLISH_LATEST" \
            --silent
