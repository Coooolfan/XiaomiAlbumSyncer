server:
  port: ${SERVER_PORT:8080}
  ssl:
    keyStore: ${SSL_KEYSTORE:}
    keyStorePassword: ${SSL_KEYSTORE_PASSWORD:}

solon:
  app:
    name: 'XiaomiAlbumSyncer'
    group: 'com.coooolfan'
    db: ${APP_DB_PATH:./db/xiaomialbumsyncer.db}
    sqlite:
      journal-mode: ${SQLITE_JOURNAL_MODE:WAL}
      synchronous: ${SQLITE_SYNCHRONOUS:NORMAL}
      cache-size: ${SQLITE_CACHE_SIZE:10000}
      temp-store: ${SQLITE_TEMP_STORE:memory}
      mmap-size: ${SQLITE_MMAP_SIZE:268435456}
    jimmer-log: false
    webauthn:
      rpId: ${WEBAUTHN_RP_ID:localhost}
      rpName: ${WEBAUTHN_RP_NAME:XiaomiAlbumSyncer}
  logging:
    appender:
      console:
        level: INFO
        pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %-19(%cyan(%-19.19logger{0})) : %msg%n"
      file:
        level: INFO
        pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-25level %-19(%-19.19logger{0}): %msg%n"

sa-token:
  is-print: off

xiaomi:
  api:
    base-url: ${XIAOMI_API_BASE_URL:https://i.mi.com}
